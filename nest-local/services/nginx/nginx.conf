# ── HTTP server (port 80) — keep as fallback ─────────────────────────
server {
    listen 80;
    server_name _;

    # ── CORS: handle preflight (OPTIONS) at nginx level ──────────
    # Respond immediately with 204 — no need to hit the upstream.
    location / {
        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
            add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       600;
            add_header Content-Length                0;
            add_header Content-Type                 "text/plain; charset=utf-8";
            return 204;
        }

        # ── Proxy to FastAPI ─────────────────────────────────────
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin            $http_origin;
        proxy_read_timeout 120s;

        # ── Strip upstream CORS headers to avoid duplicates ──────
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # ── CORS: ensure headers on every response ───────────────
        # "always" ensures they are added even on error responses (4xx/5xx).
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
    }
}

# ── HTTPS server (port 443) — primary secure endpoint ────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
            add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       600;
            add_header Content-Length                0;
            add_header Content-Type                 "text/plain; charset=utf-8";
            return 204;
        }

        # ── Proxy to FastAPI ─────────────────────────────────────
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin            $http_origin;
        proxy_read_timeout 120s;

        # ── Strip upstream CORS headers to avoid duplicates ──────
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # ── CORS: ensure headers on every response ───────────────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
    }
}

