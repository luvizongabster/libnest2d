# ── HTTP server (port 80) — redirect to HTTPS + ACME challenge ────────
server {
    listen 80;
    server_name api2.gabster.com.br;

    # Let's Encrypt HTTP-01 challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server (port 443) — Let's Encrypt certificate ──────────────
server {
    listen 443 ssl;
    server_name api2.gabster.com.br;

    ssl_certificate     /etc/letsencrypt/live/api2.gabster.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api2.gabster.com.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── MinIO S3 proxy — presigned URLs served via /s3/ ───────────
    location /s3/ {
        proxy_pass http://minio:9000/;
        proxy_http_version 1.1;

        # Forward the internal MinIO host so S3v4 signature verification succeeds.
        # Presigned URLs are signed with Host: minio:9000 and the URL is rewritten
        # to the public endpoint; nginx must forward the original host to MinIO.
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Strip any CORS headers from MinIO so we control them (avoids missing/conflicting headers)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS: must be on every response (including 4xx/5xx and redirects) for browser to allow access
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type, ETag" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 600 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain; charset=utf-8";
            return 204;
        }
    }

    location / {
        # Preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
            add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       600;
            add_header Content-Length                0;
            add_header Content-Type                 "text/plain; charset=utf-8";
            return 204;
        }

        # ── Proxy to FastAPI ─────────────────────────────────────
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Origin            $http_origin;
        proxy_read_timeout 120s;

        # ── Strip upstream CORS headers to avoid duplicates ──────
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # ── CORS: ensure headers on every response ───────────────
        # "always" ensures they are added even on error responses (4xx/5xx).
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT" always;
        add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With" always;
    }
}
