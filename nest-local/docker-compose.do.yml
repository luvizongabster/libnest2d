# Override para Digital Ocean (Droplet com MinIO no próprio servidor).
# Uso: docker compose -f docker-compose.yml -f docker-compose.do.yml up -d
# Opcional: env_file: .env (copie .env.do.example para .env e preencha).

services:
  dynamodb:
    # Use in-memory mode to avoid volume permission issues with dynamodblocal user.
    # The init container recreates the table on every startup, so persistence is not needed.
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    volumes: []

  minio:
    volumes:
      - minio-data:/data

volumes:
  minio-data:
